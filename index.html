<!DOCTYPE html>
<html lang="en">
  <head>
    <title>World Energy Globe</title>
    <meta charset="utf-8">
    <style>
      body {
        margin: 0;
        font-family: Monospace;
        color: #fff;
        font-size: 13px;
        line-height: 24px;
        overscroll-behavior: none;
      }

      a {
        color: #ff0;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      #info {
        position: absolute;
        top: 0px;
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
        text-align: center;
        z-index: 1;
      }

      #container {
        cursor: grab;

        :active {
          cursor: grabbing;
        }
      }

      
    </style>
  </head>
  <body>
    <div id="container"></div>
    <div id="info">
      World Electricity Breakdown <br/>
      Click a country to explore data.
    </div>
    <script type="module" src="src/main.ts"></script>
  </body>
</html>
