<!DOCTYPE html>
<html lang="en">
  <head>
    <title>World Energy Globe</title>
    <meta charset="utf-8">

  </head>
  <body class="m-0 overscroll-none font-mono text-white text-sm/6">

    <div class="fixed z-50 left-2 top-10 bottom-2 rounded-lg bg-white">
